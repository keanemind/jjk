<!doctype html>
<html>
  <head>
    <link rel="stylesheet" href="${cssUri}" />
    <link rel="stylesheet" href="${codiconUri}" />
  </head>

  <body>
    <div id="graph">
      <svg id="connections">
        <defs id="svg-defs"></defs>
        <g id="connection-lines"></g>
        <g id="node-circles"></g>
      </svg>
      <div id="nodes"></div>
    </div>
    <div id="hover-card" hidden></div>
    <script>
      const vscode = acquireVsCodeApi();
      let selectedNodes = new Set();
      let currentWorkingCopyId;
      let visibleChangeIds = [];
      let visibleCommitIds = [];
      const changeDetailsCache = new Map();
      // Rich per-row state lives in JS rather than serialized DOM attributes. The map is rebuilt on
      // every `updateGraph()` call, so it never outlives the current render.
      const rowDataByChangeId = new Map();
      const graphLaneStep = 10;
      const graphLanePadding = 6;
      const hoverCard = document.getElementById("hover-card");
      let hoveredNode = null;
      let hoverHideTimer = null;
      let hoverShowTimer = null;
      const hoverShowDelayMs = 700;

      window.addEventListener("message", (event) => {
        const message = event.data;
        switch (message.command) {
          case "updateGraph":
            changeDetailsCache.clear();
            selectedNodes.clear();
            document.querySelectorAll(".change-node").forEach((n) => {
              n.classList.remove("selected", "highlighted", "dimmed");
            });
            document.querySelectorAll(".node-circle").forEach((circle) => {
              circle.classList.remove("child-node", "dimmed");
            });
            document.querySelectorAll(".connection-line").forEach((line) => {
              line.classList.remove(
                "highlighted",
                "dimmed",
                "child-connection",
              );
            });
            currentWorkingCopyId = message.workingCopyId;
            vscode.postMessage({
              command: "selectChange",
              selectedNodes: [],
            });
            updateGraph(
              message.changes,
              message.workingCopyId,
              message.preserveScroll,
            );
            break;
          case "changeDetails":
            if (message.changeId) {
              changeDetailsCache.set(message.changeId, message.details);
              if (
                hoveredNode?.dataset.changeId === message.changeId &&
                !hoverCard.hidden
              ) {
                // Update the current render's row snapshot so subsequent hover redraws can reuse
                // the fetched description without another DOM serialization round-trip.
                const hoveredChange = rowDataByChangeId.get(message.changeId);
                if (message.details?.fullDescription) {
                  hoveredChange.fullDescription =
                    message.details.fullDescription;
                }
                renderHoverCard(hoveredChange, hoveredNode);
              }
            }
            break;
        }
      });

      function getPathBounds(pathData) {
        // Create a temporary SVG to measure the path
        const svg = document.createElementNS(
          "http://www.w3.org/2000/svg",
          "svg",
        );
        const path = document.createElementNS(
          "http://www.w3.org/2000/svg",
          "path",
        );
        path.setAttribute("d", pathData);
        svg.appendChild(path);
        document.body.appendChild(svg);

        // Get the bounding box
        const bbox = path.getBBox();

        // Clean up
        document.body.removeChild(svg);

        return bbox;
      }

      function createCircle(change, workingCopyId) {
        const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
        g.setAttribute("class", "node-circle");

        const isWorkingCopy = change.contextValue === workingCopyId;
        const radius = isWorkingCopy ? "7" : "5";

        if (isWorkingCopy) {
          g.classList.add("working-copy-circle");
        }

        if (change.branchType === "◆") {
          g.classList.add("immutable-circle");
          // Create diamond shape
          const diamond = document.createElementNS(
            "http://www.w3.org/2000/svg",
            "path",
          );
          const size = 5;
          const d = `M 6 ${6 - size} L ${6 + size} 6 L 6 ${6 + size} L ${6 - size} 6 Z`;
          diamond.setAttribute("d", d);
          diamond.setAttribute("class", "diamond-path");
          g.appendChild(diamond);
        } else {
          // Create circle (filled or outlined)
          const circle = document.createElementNS(
            "http://www.w3.org/2000/svg",
            "circle",
          );
          circle.setAttribute("cx", "6");
          circle.setAttribute("cy", "6");
          circle.setAttribute("r", radius);

          if (change.branchType === "○") {
            circle.style.fill = "var(--vscode-editor-background)";
            circle.setAttribute("stroke-width", "1.5");
          }
          g.appendChild(circle);
        }

        if (isWorkingCopy) {
          const marker = document.createElementNS(
            "http://www.w3.org/2000/svg",
            "text",
          );
          marker.setAttribute("x", "6");
          marker.setAttribute("y", "8.5");
          marker.setAttribute("text-anchor", "middle");
          marker.setAttribute("class", "working-copy-marker");
          marker.textContent = "@";
          g.appendChild(marker);
        }

        return g;
      }

      function getUniquePrefixLength(value, values, minimumLength = 1) {
        if (!value) {
          return 0;
        }

        for (let length = minimumLength; length <= value.length; length++) {
          const prefix = value.slice(0, length);
          const isUnique = values.every((otherValue) => {
            return otherValue === value || !otherValue.startsWith(prefix);
          });
          if (isUnique) {
            return length;
          }
        }

        return value.length;
      }

      function buildSegmentedId(id, className, uniqueLength) {
        const wrapper = document.createElement("span");
        wrapper.className = `segmented-id ${className}`;
        wrapper.dataset.fullId = id;

        const shortLength = Math.max(4, uniqueLength);
        const shortUniqueLength = Math.min(uniqueLength, shortLength);
        const shortSpan = document.createElement("span");
        shortSpan.className = "id-short";
        const shortUniqueSpan = document.createElement("span");
        shortUniqueSpan.className = "id-unique";
        shortUniqueSpan.textContent = id.slice(0, shortUniqueLength);
        shortSpan.appendChild(shortUniqueSpan);
        if (shortUniqueLength < shortLength) {
          const shortRemainderSpan = document.createElement("span");
          shortRemainderSpan.className = "id-remainder";
          shortRemainderSpan.textContent = id.slice(
            shortUniqueLength,
            shortLength,
          );
          shortSpan.appendChild(shortRemainderSpan);
        }
        wrapper.appendChild(shortSpan);

        const uniqueSpan = document.createElement("span");
        uniqueSpan.className = "id-unique id-full";
        uniqueSpan.textContent = id.slice(0, uniqueLength);
        wrapper.appendChild(uniqueSpan);

        if (uniqueLength < id.length) {
          const remainderSpan = document.createElement("span");
          remainderSpan.className = "id-remainder id-full";
          remainderSpan.textContent = id.slice(uniqueLength);
          wrapper.appendChild(remainderSpan);
        }

        return wrapper;
      }

      function buildMetaText(text, className) {
        const meta = document.createElement("span");
        meta.className = `meta-text ${className}`;
        meta.textContent = text;
        return meta;
      }

      function buildMetaPill(text, className) {
        const pill = document.createElement("span");
        pill.className = `meta-pill ${className}`;
        const pillLabel = document.createElement("span");
        pillLabel.className = "meta-pill-label";
        pillLabel.textContent = text;
        pill.appendChild(pillLabel);
        return pill;
      }

      function buildCopyButton(value, label) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "hover-copy-button";
        button.title = `Copy ${label}`;
        button.setAttribute("aria-label", `Copy ${label}`);
        button.innerHTML = '<i class="codicon codicon-copy"></i>';
        button.addEventListener("click", async (event) => {
          event.preventDefault();
          event.stopPropagation();
          try {
            await navigator.clipboard.writeText(value);
          } catch {
            const selection = window.getSelection();
            const range = document.createRange();
            const temp = document.createElement("span");
            temp.textContent = value;
            hoverCard.appendChild(temp);
            range.selectNodeContents(temp);
            selection?.removeAllRanges();
            selection?.addRange(range);
            document.execCommand("copy");
            selection?.removeAllRanges();
            temp.remove();
          }
        });
        return button;
      }

      function buildHoverActionButton(label, title, onClick, icon) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "hover-action-button";
        button.title = title;
        button.setAttribute("aria-label", label);
        if (icon) {
          button.classList.add("icon-only");
          button.innerHTML = `<i class="codicon ${icon}"></i>`;
        } else {
          button.textContent = label;
        }
        button.addEventListener("click", (event) => {
          event.preventDefault();
          event.stopPropagation();
          onClick();
        });
        return button;
      }

      function appendHoverField(grid, label, valueBuilder) {
        const row = document.createElement("div");
        row.className = "hover-field-row";

        const key = document.createElement("span");
        key.className = "hover-field-key";
        key.textContent = `${label}:`;
        row.appendChild(key);

        const value = document.createElement("div");
        value.className = "hover-field-value";
        valueBuilder(value);
        row.appendChild(value);

        grid.appendChild(row);
      }

      function formatChangeStats(stats) {
        if (!stats || !stats.total) {
          return "";
        }

        const parts = [
          `${stats.total} file${stats.total === 1 ? "" : "s"} changed`,
        ];
        if (stats.modified) {
          parts.push(`${stats.modified} modified`);
        }
        if (stats.added) {
          parts.push(`${stats.added} added`);
        }
        if (stats.removed) {
          parts.push(`${stats.removed} removed`);
        }
        if (stats.renamed) {
          parts.push(`${stats.renamed} renamed`);
        }
        if (stats.copied) {
          parts.push(`${stats.copied} copied`);
        }
        return parts.join(" • ");
      }

      function isSpecialRefName(refName) {
        return /^(?:[a-z_][a-z0-9_-]*)\(\)$/i.test(refName);
      }

      function getShortDate(timestamp) {
        if (!timestamp) {
          return "";
        }
        return timestamp.split(" ")[0] || timestamp;
      }

      function buildStatusText(text, className) {
        const status = document.createElement("span");
        status.className = `status-text ${className}`;
        status.textContent = text;
        return status;
      }

      function clearHoverCard() {
        if (hoverShowTimer) {
          clearTimeout(hoverShowTimer);
          hoverShowTimer = null;
        }
        if (hoverHideTimer) {
          clearTimeout(hoverHideTimer);
          hoverHideTimer = null;
        }
        if (hoveredNode) {
          highlightConnectedNodes(hoveredNode, false);
        }
        hoverCard.hidden = true;
        hoverCard.innerHTML = "";
        hoveredNode = null;
      }

      function getTextContentRect(node) {
        // Hover positioning is anchored from the text block rather than the graph lane so the
        // circles remain clickable while the card is visible.
        return (
          node.querySelector(".text-content") || node
        ).getBoundingClientRect();
      }

      function getNodeCenter(node, svgRect) {
        // The line and circle renderers both work in SVG coordinates, so centralize the DOM-to-SVG
        // conversion instead of repeating slightly different formulas.
        const nodeRect = node.getBoundingClientRect();
        return {
          nodeRect,
          y: nodeRect.top - svgRect.top + nodeRect.height / 2,
        };
      }

      function getLaneX(nodeRect, svgRect, symbolColumn) {
        // jj lane routing is column-based, so keep the X calculation in one helper to make the
        // connection and circle renderers share the same horizontal anchor.
        return (
          nodeRect.left -
          svgRect.left +
          graphLanePadding +
          Number(symbolColumn || 0) * graphLaneStep
        );
      }

      function getRowData(changeId) {
        return rowDataByChangeId.get(changeId);
      }

      function getParentIds(node) {
        // Parent IDs are part of the render-scoped row state so callers can read them without
        // reparsing JSON from `dataset`.
        return getRowData(node.dataset.changeId)?.parentChangeIds || [];
      }

      function appendHoverAuthorField(headerFields, change) {
        if (!change.authorDisplay && !change.author) {
          return;
        }

        // The compact row only shows the display name; the hover expands to the full
        // display-name-plus-email representation for copyable detail.
        appendHoverField(headerFields, "Author", (value) => {
          const author = document.createElement("span");
          author.className = "hover-author";
          author.textContent = change.authorDisplay || change.author;
          value.append(author);

          if (change.author) {
            const email = document.createElement("span");
            email.className = "hover-email";
            email.textContent = `<${change.author}>`;
            value.append(email);
          }
        });
      }

      function appendHoverTimestampField(headerFields, change) {
        if (!change.timestamp) {
          return;
        }

        // Keep timestamp rendering in a dedicated helper so hover header fields remain easy to
        // reorder without touching the shared field-row construction.
        appendHoverField(headerFields, "Timestamp", (value) => {
          const timestamp = document.createElement("span");
          timestamp.className = "hover-timestamp";
          timestamp.textContent = change.timestamp;
          value.append(timestamp);
        });
      }

      function appendHoverDescription(change, cachedDetails) {
        // Prefer lazily fetched details, then fall back to the parser-provided description fields
        // so the hover remains useful before the `jj show` round-trip completes.
        const hoverDescription =
          cachedDetails?.fullDescription ||
          change.fullDescription ||
          change.description;
        if (!hoverDescription) {
          return;
        }

        const description = document.createElement("div");
        description.className = `hover-description${change.hasDescription ? "" : " placeholder"}`;
        description.textContent = hoverDescription;
        hoverCard.appendChild(description);
      }

      function appendHoverFooter(change) {
        if (!change.refName && !change.isEmpty && !change.isConflict) {
          return;
        }

        // Refs and status belong to the change as a whole rather than the field/value metadata, so
        // keep them grouped in a footer instead of repeating more labeled rows.
        const footer = document.createElement("div");
        footer.className = "hover-footer";

        if (change.refName) {
          footer.append(
            buildMetaPill(
              change.refName,
              `ref-name${isSpecialRefName(change.refName) ? " special-ref" : " bookmark-ref"}`,
            ),
          );
        }

        if (change.isEmpty) {
          footer.append(buildMetaPill("empty", "status-pill empty"));
        }

        if (change.isConflict) {
          footer.append(buildMetaPill("conflict", "status-pill conflict"));
        }

        hoverCard.appendChild(footer);
      }

      function requestHoverDetailsIfNeeded(change) {
        if (
          change.contextValue &&
          !changeDetailsCache.has(change.contextValue)
        ) {
          // Hover details are fetched lazily because they include the full description body, which
          // is intentionally omitted from the compact graph log template.
          vscode.postMessage({
            command: "requestChangeDetails",
            changeId: change.contextValue,
          });
        }
      }

      function scheduleHideHoverCard() {
        if (hoverHideTimer) {
          clearTimeout(hoverHideTimer);
        }
        hoverHideTimer = setTimeout(() => {
          clearHoverCard();
        }, 80);
      }

      function cancelHideHoverCard() {
        if (hoverHideTimer) {
          clearTimeout(hoverHideTimer);
          hoverHideTimer = null;
        }
      }

      function scheduleShowHoverCard(change, node) {
        if (hoverShowTimer) {
          clearTimeout(hoverShowTimer);
        }
        // The graph sits in a narrow sidebar, so wait long enough that pointer travel across
        // adjacent rows does not constantly trigger accidental hover cards.
        hoverShowTimer = setTimeout(() => {
          hoverShowTimer = null;
          renderHoverCard(change, node);
        }, hoverShowDelayMs);
      }

      function positionHoverCard(node) {
        const nodeRect = node.getBoundingClientRect();
        const graphRect = document
          .getElementById("graph")
          .getBoundingClientRect();
        const textRect = getTextContentRect(node);
        const cardWidth = hoverCard.offsetWidth || 0;
        const cardHeight = hoverCard.offsetHeight || 0;
        // Anchor from the text column instead of the graph lane so the left-side circles remain
        // targetable while the hover is open.
        const preferredRight = textRect.left - graphRect.left + 16;
        const preferredLeft = textRect.right - graphRect.left - cardWidth - 16;
        const maxLeft = graphRect.width - cardWidth - 8;
        const left =
          preferredRight + cardWidth <= graphRect.width - 8
            ? preferredRight
            : Math.max(8, Math.min(preferredLeft, maxLeft));
        const preferredTop = nodeRect.bottom - graphRect.top - 6;
        const viewportHeight =
          window.innerHeight || document.documentElement.clientHeight;
        const maxTop = viewportHeight - graphRect.top - cardHeight - 8;
        const top = Math.max(8, Math.min(preferredTop, Math.max(8, maxTop)));
        hoverCard.style.left = `${left}px`;
        hoverCard.style.top = `${top}px`;
      }

      function renderHoverCard(change, node) {
        hoverCard.innerHTML = "";

        const headerFields = document.createElement("div");
        headerFields.className = "hover-field-grid";

        if (change.commitId) {
          appendHoverField(headerFields, "Commit ID", (value) => {
            value.append(
              buildSegmentedId(
                change.commitId,
                "commit-id",
                getUniquePrefixLength(change.commitId, visibleCommitIds, 1),
              ),
            );
            value.append(buildCopyButton(change.commitId, "commit ID"));
            if (change.contextValue) {
              if (change.contextValue !== "zzzzzzzz") {
                value.append(
                  buildHoverActionButton(
                    "Edit this change",
                    "Edit this change",
                    () => {
                      vscode.postMessage({
                        command: "editChange",
                        changeId: change.contextValue,
                      });
                    },
                    "codicon-edit",
                  ),
                );
              }
              value.append(
                buildHoverActionButton(
                  "New change",
                  "Create and edit a new change with this revision as its parent",
                  () => {
                    vscode.postMessage({
                      command: "newChangeFrom",
                      changeId: change.contextValue,
                    });
                  },
                  "codicon-git-branch-create",
                ),
              );
            }
          });
        }

        if (change.changeId) {
          appendHoverField(headerFields, "Change ID", (value) => {
            value.append(
              buildSegmentedId(
                change.changeId,
                "change-id",
                getUniquePrefixLength(change.changeId, visibleChangeIds, 1),
              ),
            );
            value.append(buildCopyButton(change.changeId, "change ID"));
          });
        }

        appendHoverAuthorField(headerFields, change);
        appendHoverTimestampField(headerFields, change);

        hoverCard.appendChild(headerFields);

        // Reuse any fetched detail data so moving back onto the same node does not re-request
        // `jj show`, but still fall back to the compact row text before the detail round-trip
        // completes.
        const cachedDetails = changeDetailsCache.get(change.contextValue);
        const statsText = formatChangeStats(cachedDetails?.stats);
        if (statsText) {
          const stats = document.createElement("div");
          stats.className = "hover-stats";
          stats.textContent = statsText;
          hoverCard.appendChild(stats);
        }
        appendHoverDescription(change, cachedDetails);
        appendHoverFooter(change);

        hoverCard.hidden = false;
        hoveredNode = node;
        positionHoverCard(node);

        requestHoverDetailsIfNeeded(change);
      }

      function updateConnections() {
        const nodes = document.querySelectorAll(".change-node");

        const connectionLines = document.getElementById("connection-lines");
        connectionLines.innerHTML = "";

        // Get SVG's position for coordinate conversion
        const svg = document.getElementById("connections");
        const svgRect = svg.getBoundingClientRect();

        const nodeMap = new Map();
        nodes.forEach((node, i) => {
          nodeMap.set(node.dataset.changeId, node);
        });

        nodes.forEach((node, index) => {
          const parentIds = getParentIds(node);
          const { nodeRect, y: currentY } = getNodeCenter(node, svgRect);
          const currentColumn = Number(node.dataset.symbolColumn || "0");

          // Convert to SVG coordinates with vertical centering
          const currentX = getLaneX(nodeRect, svgRect, currentColumn);

          parentIds.forEach((parentId, index) => {
            const parentNode = nodeMap.get(parentId);
            if (parentNode) {
              const { nodeRect: parentRect, y: parentY } = getNodeCenter(
                parentNode,
                svgRect,
              );
              const parentColumn = Number(
                parentNode.dataset.symbolColumn || "0",
              );
              const parentX = getLaneX(parentRect, svgRect, parentColumn);

              const path = document.createElementNS(
                "http://www.w3.org/2000/svg",
                "path",
              );
              path.setAttribute("class", "connection-line");
              path.dataset.fromChangeId = node.dataset.changeId;
              path.dataset.toChangeId = parentId;

              const isLatestParent = index === 0;
              const isAdjacent = !Array.from(nodes).some((otherNode) => {
                if (otherNode === node || otherNode === parentNode)
                  return false;
                const otherRect = otherNode.getBoundingClientRect();
                return (
                  otherRect.top > Math.min(nodeRect.top, parentRect.top) &&
                  otherRect.top < Math.max(nodeRect.top, parentRect.top)
                );
              });

              if (
                isLatestParent &&
                currentColumn === parentColumn &&
                isAdjacent
              ) {
                // Vertical line for adjacent nodes
                path.setAttribute(
                  "d",
                  `
                                M ${currentX} ${currentY}
                                L ${parentX} ${parentY}
                            `,
                );
              } else {
                // Bend close to the child node so the vertical segment at the
                // child's column stays short and doesn't bleed through unrelated
                // branches that share the same column.
                const bendY = Math.min(
                  currentY + nodeRect.height,
                  (currentY + parentY) / 2,
                );
                path.setAttribute(
                  "d",
                  `
                                M ${currentX} ${currentY}
                                L ${currentX} ${bendY}
                                L ${parentX} ${bendY}
                                L ${parentX} ${parentY}
                            `,
                );
              }

              connectionLines.appendChild(path);
            }
          });
        });
      }

      function highlightConnectedNodes(nodeElement, highlight) {
        const nodes = document.querySelectorAll(".change-node");
        const nodeCircles = document.querySelectorAll(
          "#node-circles .node-circle",
        );

        if (highlight) {
          const nodeId = nodeElement.dataset.changeId;
          const parentIds = getParentIds(nodeElement);

          // Find child nodes (nodes that have this node as a parent)
          const childNodes = Array.from(nodes).filter((node) => {
            const nodeParentIds = getParentIds(node);
            return nodeParentIds.includes(nodeId);
          });
          const childIds = childNodes.map((node) => node.dataset.changeId);

          // First, dim all nodes and circles
          nodes.forEach((node) => node.classList.add("dimmed"));
          nodeCircles.forEach((circle) => circle.classList.add("dimmed"));
          document
            .querySelectorAll(".connection-line")
            .forEach((line) => line.classList.add("dimmed"));

          // Un-dim and highlight relevant nodes
          nodeElement.classList.remove("dimmed");
          nodeElement.classList.add("highlighted");

          // Un-dim parent nodes
          parentIds.forEach((parentId) => {
            const parentNode = document.querySelector(
              `.change-node[data-change-id="${parentId}"]`,
            );
            if (parentNode) {
              parentNode.classList.remove("dimmed");
              parentNode.classList.add("highlighted");
            }
          });

          // Un-dim child nodes
          childNodes.forEach((node) => {
            node.classList.remove("dimmed");
            node.classList.add("highlighted");
          });

          // Handle node circles
          nodeCircles.forEach((circle) => {
            const circleY = parseFloat(
              circle
                .getAttribute("transform")
                .match(/translate\(([\d.-]+),\s*([\d.-]+)\)/)[2],
            );

            // Find the node that corresponds to this circle
            const correspondingNode = Array.from(nodes).find((node) => {
              const nodeRect = node.getBoundingClientRect();
              const svgRect = document
                .getElementById("connections")
                .getBoundingClientRect();
              const nodeY =
                nodeRect.top - svgRect.top + nodeRect.height / 2 - 6;
              return Math.abs(nodeY - circleY) < 1;
            });

            if (correspondingNode) {
              const circleNodeId = correspondingNode.dataset.changeId;
              if (
                circleNodeId === nodeId ||
                parentIds.includes(circleNodeId) ||
                childIds.includes(circleNodeId)
              ) {
                circle.classList.remove("dimmed");
                if (childIds.includes(circleNodeId)) {
                  circle.classList.add("child-node");
                }
              }
            }
          });

          // Handle connection lines
          document.querySelectorAll(".connection-line").forEach((line) => {
            const pathD = line.getAttribute("d");
            const matches = pathD.match(/M\s*([\d.-]+)\s*([\d.-]+)/);
            if (matches) {
              // Find which nodes this line connects
              const [fromNode, toNode] = findConnectedNodes(line, nodes);
              if (!fromNode || !toNode) return;

              const fromId = fromNode.dataset.changeId;
              const toId = toNode.dataset.changeId;

              // Highlight if:
              // 1. Line goes from hovered node to its parent (direct parent connection)
              // 2. Line goes from child to hovered node (direct child connection)
              if (
                (fromId === nodeId && parentIds.includes(toId)) ||
                (childIds.includes(fromId) && toId === nodeId)
              ) {
                line.classList.remove("dimmed");
                line.classList.add("highlighted");
                // Add child-connection class if it's a direct connection from child
                if (childIds.includes(fromId) && toId === nodeId) {
                  line.classList.add("child-connection");
                }
              }
            }
          });
        } else {
          // Reset everything when hover ends
          nodes.forEach((node) => {
            node.classList.remove("dimmed", "highlighted");
          });
          nodeCircles.forEach((circle) => {
            circle.classList.remove("dimmed", "child-node");
          });
          document.querySelectorAll(".connection-line").forEach((line) => {
            line.classList.remove("highlighted", "dimmed", "child-connection");
          });
        }
      }

      function findConnectedNodes(line, nodes) {
        const fromId = line.dataset.fromChangeId;
        const toId = line.dataset.toChangeId;
        const fromNode = Array.from(nodes).find(
          (node) => node.dataset.changeId === fromId,
        );
        const toNode = Array.from(nodes).find(
          (node) => node.dataset.changeId === toId,
        );

        return [fromNode, toNode];
      }

      function updateGraph(changes, workingCopyId, preserveScroll = false) {
        // Save current scroll position only when preserveScroll is true
        const scrollTop = preserveScroll
          ? window.scrollY || document.documentElement.scrollTop
          : 0;

        const nodesContainer = document.getElementById("nodes");
        const circlesContainer = document.getElementById("node-circles");
        nodesContainer.innerHTML = "";
        circlesContainer.innerHTML = "";
        // Rebuild row state together with the DOM so refresh stays the single source of truth.
        rowDataByChangeId.clear();

        const maxSymbolColumn = changes.reduce((max, change) => {
          return Math.max(max, Number(change.symbolColumn || 0));
        }, 0);
        // Size the graph lane gutter from the parsed symbol columns so side branches can widen the
        // SVG without changing the two-line text row layout.
        const graphWidth =
          graphLanePadding * 2 + (maxSymbolColumn + 1) * graphLaneStep;
        document.documentElement.style.setProperty(
          "--graph-width",
          `${graphWidth}px`,
        );

        const changeIds = changes
          .filter((candidate) => !candidate.isElided && candidate.changeId)
          .map((candidate) => candidate.changeId);
        const commitIds = changes
          .filter((candidate) => !candidate.isElided && candidate.commitId)
          .map((candidate) => candidate.commitId);
        visibleChangeIds = changeIds;
        visibleCommitIds = commitIds;

        changes.forEach((change) => {
          if (change.isElided) {
            const truncationRow = document.createElement("div");
            truncationRow.className = "truncation-row";
            truncationRow.textContent = "~ Older revisions hidden";
            nodesContainer.appendChild(truncationRow);
            return;
          }

          if (!change.contextValue) return;
          const node = document.createElement("div");
          node.className = "change-node";
          node.dataset.changeId = change.contextValue;
          node.dataset.branchType = change.branchType;
          node.dataset.symbolColumn = String(change.symbolColumn || 0);
          // Store a shallow snapshot for hover/highlight logic; the DOM only keeps scalar lookup
          // fields that are convenient for selectors and event targeting.
          rowDataByChangeId.set(change.contextValue, { ...change });

          // Create text content container
          const textContent = document.createElement("div");
          textContent.className = "text-content";

          const metaLine = document.createElement("div");
          metaLine.className = "meta-line";

          const metaPrimary = document.createElement("div");
          metaPrimary.className = "meta-primary";

          metaPrimary.append(
            buildSegmentedId(
              change.changeId,
              "change-id",
              getUniquePrefixLength(change.changeId, changeIds, 1),
            ),
          );

          const author = document.createElement("span");
          author.className = "author";
          author.textContent = change.authorDisplay || "";

          if (author.textContent) {
            metaPrimary.append(author);
          }

          if (change.refName) {
            const refPill = buildMetaPill(
              change.refName,
              `ref-name${isSpecialRefName(change.refName) ? " special-ref" : " bookmark-ref"}`,
            );
            refPill.title = change.refName;
            metaPrimary.append(refPill);
          }

          metaLine.append(metaPrimary);

          const commitIdField = document.createElement("div");
          commitIdField.className = "meta-commit";
          commitIdField.append(
            buildSegmentedId(
              change.commitId,
              "commit-id commit-id-field",
              getUniquePrefixLength(change.commitId, commitIds, 1),
            ),
          );
          metaLine.append(commitIdField);

          textContent.append(metaLine);

          const summaryLine = document.createElement("div");
          summaryLine.className = "summary-line";

          if (change.isEmpty) {
            summaryLine.append(buildMetaPill("empty", "status-pill empty"));
          }

          if (change.isConflict) {
            summaryLine.append(
              buildMetaPill("conflict", "status-pill conflict"),
            );
          }

          if (change.description) {
            const nodeDescription = document.createElement("span");
            nodeDescription.className = `description${change.hasDescription ? "" : " placeholder"}`;
            nodeDescription.textContent = change.description;
            summaryLine.append(nodeDescription);
          }

          textContent.append(summaryLine);
          node.appendChild(textContent);
          nodesContainer.appendChild(node);

          // Create circle and add it to SVG after node is in DOM
          const circle = createCircle(
            {
              contextValue: change.contextValue,
              branchType: change.branchType,
            },
            workingCopyId,
          );

          // Get positions relative to SVG
          const nodeRect = node.getBoundingClientRect();
          const svgRect = document
            .getElementById("connections")
            .getBoundingClientRect();
          const x = getLaneX(nodeRect, svgRect, change.symbolColumn) - 6;
          const y = nodeRect.top - svgRect.top + nodeRect.height / 2 - 6; // -6 to account for circle radius

          circle.setAttribute("transform", `translate(${x}, ${y})`);
          circlesContainer.appendChild(circle);

          // Add hover handlers
          node.addEventListener("mouseenter", () => {
            cancelHideHoverCard();
            highlightConnectedNodes(node, true);
            scheduleShowHoverCard(change, node);
          });

          node.addEventListener("mouseleave", () => {
            scheduleHideHoverCard();
          });

          node.addEventListener("mousemove", () => {
            if (!hoverCard.hidden) {
              positionHoverCard(node);
            }
          });

          node.onclick = (e) => {
            if (selectedNodes.has(change.contextValue)) {
              // Deselecting a node
              selectedNodes.delete(change.contextValue);
              node.classList.remove("selected");
            } else {
              // Adding a new node to selection
              selectedNodes.add(change.contextValue);
              node.classList.add("selected");
            }

            vscode.postMessage({
              command: "selectChange",
              selectedNodes: Array.from(selectedNodes),
            });

            cancelHideHoverCard();
            if (hoverShowTimer) {
              clearTimeout(hoverShowTimer);
              hoverShowTimer = null;
            }
            highlightConnectedNodes(node, true);
            renderHoverCard(change, node);
          };
        });

        // Wait for next frame to ensure DOM is updated
        requestAnimationFrame(() => {
          updateConnections();
          updateCirclePositions();
          // Restore scroll position only if we saved it
          if (scrollTop > 0) {
            window.scrollTo(0, scrollTop);
          }
        });
      }

      function updateCirclePositions() {
        const nodes = document.querySelectorAll(".change-node");
        const circlesContainer = document.getElementById("node-circles");
        const svgRect = document
          .getElementById("connections")
          .getBoundingClientRect();

        // Clear and rebuild all circles
        circlesContainer.innerHTML = "";

        nodes.forEach((node) => {
          const nodeRect = node.getBoundingClientRect();
          const contextValue = node.dataset.changeId;
          const symbolColumn = Number(node.dataset.symbolColumn || "0");

          const g = createCircle(
            {
              contextValue: contextValue,
              branchType: node.dataset.branchType,
            },
            currentWorkingCopyId,
          );

          // Position the circle group
          const x = getLaneX(nodeRect, svgRect, symbolColumn) - 6;
          const y = nodeRect.top - svgRect.top + nodeRect.height / 2 - 6;
          g.setAttribute("transform", `translate(${x}, ${y})`);

          circlesContainer.appendChild(g);
        });

        // Reapply any existing classes (like child-node or dimmed)
        const hoveredNode = document.querySelector(".change-node:hover");
        if (hoveredNode && selectedNodes.size === 0) {
          highlightConnectedNodes(hoveredNode, true);
        }
      }

      // Update the resize handler
      let resizeTimeout;
      window.addEventListener("resize", () => {
        clearHoverCard();
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(() => {
          requestAnimationFrame(() => {
            updateConnections();
            updateCirclePositions();
          });
        }, 2);
      });

      window.addEventListener("scroll", () => {
        clearHoverCard();
      });

      hoverCard.addEventListener("mouseenter", () => {
        cancelHideHoverCard();
      });

      hoverCard.addEventListener("mouseleave", () => {
        scheduleHideHoverCard();
      });

      // Signal that the webview is ready
      window.addEventListener("load", () => {
        vscode.postMessage({ command: "webviewReady" });
      });
    </script>
  </body>
</html>
